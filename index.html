<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="weather-container">
    <h1>Weather App</h1>

    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button id="searchBtn">Search</button>
      <button id="locationBtn" title="Use my location">📍</button>
    </div>

    <div id="message" class="message"></div>

    <div id="weatherCard" class="weather-card hidden">
      <h2 id="cityName"></h2>
      <p id="dateTime" class="date-time"></p>
      <div class="weather-main">
        <span id="weatherIcon" class="weather-icon"></span>
        <span id="temperature" class="temperature"></span>
      </div>
      <p id="description" class="description"></p>

      <div class="details-grid">
        <div class="detail">
          <span class="label">Feels Like</span>
          <span id="feelsLike" class="value"></span>
        </div>
        <div class="detail">
          <span class="label">Humidity</span>
          <span id="humidity" class="value"></span>
        </div>
        <div class="detail">
          <span class="label">Wind Speed</span>
          <span id="windSpeed" class="value"></span>
        </div>
        <div class="detail">
          <span class="label">Precipitation</span>
          <span id="precipitation" class="value"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
